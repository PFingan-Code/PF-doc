name: Build Document and Deploy

on:
  push:
    paths:
      - 'data/**'  # 当data目录下的任何文件发生变化时触发
    branches:
      - main  # 仅在main分支上触发
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write    # 需要Pages写入权限
      id-token: write # 需要部署Pages的权限

    # 配置GitHub Pages环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # build.py 不再依赖 Git 历史

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 不使用pip缓存，避免因缺少requirements.txt而报错
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 如果需要其他依赖但不想添加到requirements.txt，可以在这里额外安装

      - name: 运行build.py脚本
        run: |
          python build.py --merge
          # 添加--merge参数保留现有结构
          # Git 信息改由前端通过 GitHub API 动态获取
          
      # 部署到GitHub Pages的步骤
      - name: 设置Pages
        uses: actions/configure-pages@v5
        
      - name: 上传构建结果
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 